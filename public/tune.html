<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexxToHubOnTop - Tune Viewer</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style> body{font-family:'Space Grotesk',sans-serif; background:#0a0a0a; color:white;} </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">
  <div class="w-full max-w-[480px]">
    <h1 class="text-2xl font-bold text-center mt-6 mb-2">NEXXTOHUBONTOP</h1>
    <p class="text-center text-zinc-500 text-sm mb-6">Jeepney Tune Viewer</p>

    <div class="bg-zinc-900 rounded-[24px] p-6 border border-zinc-800">
      <div class="flex flex-col items-center">
        <img id="avatar" src="https://tr.rbxcdn.com/30DAY-AvatarHeadshot-.../420/420/AvatarHeadshot/Png/noFilter" class="w-28 h-28 rounded-full bg-zinc-800 object-cover border-2 border-zinc-700"/>
        <h2 id="username" class="text-xl font-bold mt-4">@username</h2>
        <p id="displayName" class="text-zinc-400 text-sm">DisplayName</p>
        
        <div class="grid grid-cols-2 gap-3 w-full mt-6">
          <div class="bg-zinc-800 rounded-xl p-3">
            <p class="text-[10px] text-zinc-500 uppercase tracking-widest">Jeep</p>
            <p id="jeep" class="font-semibold text-sm mt-1">—</p>
          </div>
          <div class="bg-zinc-800 rounded-xl p-3">
            <p class="text-[10px] text-zinc-500 uppercase tracking-widest">Sent At</p>
            <p id="time" class="font-semibold text-xs mt-1">—</p>
          </div>
        </div>
      </div>

      <div class="flex gap-3 mt-6">
        <button onclick="toggleFront()" class="flex-1 bg-white text-black rounded-xl py-3 font-bold text-sm hover:bg-zinc-200 transition">Front Tune</button>
        <button onclick="toggleRear()" class="flex-1 bg-zinc-800 border border-zinc-700 rounded-xl py-3 font-bold text-sm hover:bg-zinc-700 transition">Rear Tune</button>
      </div>

      <div id="frontPanel" class="mt-4 bg-black rounded-xl p-4 border border-zinc-800">
        <h3 class="font-bold text-orange-400 mb-3">Front Suspension</h3>
        <div class="space-y-2 text-sm font-mono">
          <div class="flex justify-between"><span class="text-zinc-500">Height</span><span id="fh">0.0000</span></div>
          <div class="flex justify-between"><span class="text-zinc-500">Stiffness</span><span id="fs">0.0000</span></div>
          <div class="flex justify-between"><span class="text-zinc-500">Dampening</span><span id="fd">0.0000</span></div>
        </div>
      </div>

      <div id="rearPanel" class="mt-3 bg-black rounded-xl p-4 border border-zinc-800 hidden">
        <h3 class="font-bold text-blue-400 mb-3">Rear Suspension</h3>
        <div class="space-y-2 text-sm font-mono">
          <div class="flex justify-between"><span class="text-zinc-500">Height</span><span id="rh">0.0000</span></div>
          <div class="flex justify-between"><span class="text-zinc-500">Stiffness</span><span id="rs">0.0000</span></div>
          <div class="flex justify-between"><span class="text-zinc-500">Dampening</span><span id="rd">0.0000</span></div>
        </div>
      </div>

      <button onclick="copyTuneCode()" class="w-full mt-6 bg-[#ff6a00] text-white rounded-xl py-3.5 font-bold text-sm hover:bg-orange-600 transition flex items-center justify-center gap-2">
        <span>📋</span> Get Tune Code
      </button>

      <p id="codePreview" class="mt-3 text-[10px] text-zinc-600 font-mono break-all text-center"></p>
    </div>
  </div>

<script>
let __tuneCode = "";
async function loadTune(){
  const params = new URLSearchParams(window.location.search);
  const hashData = window.location.hash.slice(1);
  let data = null;

  if(params.get('data')){
    try { data = JSON.parse(atob(params.get('data'))); } catch(e){ console.log(e) }
  } else if(hashData){
    try { data = JSON.parse(atob(hashData)); } catch(e){}
  } else if(params.get('id')){
    try{
      const res = await fetch(`https://pastefy.app/api/v2/paste/${params.get('id')}`);
      const j = await res.json();
      let content = j.content || j.paste?.content || j.raw;
      if(typeof content === 'string') data = JSON.parse(content);
      else data = content;
    }catch(e){ console.error(e) }
  }

  if(!data){
    document.body.innerHTML = '<div class="flex h-screen items-center justify-center text-zinc-500">Invalid Tune Link</div>';
    return;
  }

  let avatarUrl = "https://tr.rbxcdn.com/30DAY-AvatarHeadshot-...";
  if(data.userId){
    try{
      const thumb = await fetch(`https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${data.userId}&size=420x420&format=Png&isCircular=false`).then(r=>r.json());
      avatarUrl = thumb.data[0].imageUrl;
    }catch{}
  }

  document.getElementById('avatar').src = avatarUrl;
  document.getElementById('username').innerText = data.target || data.username || 'Unknown';
  document.getElementById('displayName').innerText = data.displayName || data.target || '';
  document.getElementById('jeep').innerText = data.jeepName || data.jeep || 'Unknown Jeep';
  document.getElementById('time').innerText = data.date || new Date().toLocaleString();

  const fh = parseFloat(data.fh ?? data.frontHeight ?? 0);
  const fs = parseFloat(data.fs ?? data.frontStiffness ?? 0);
  const fd = parseFloat(data.fd ?? data.frontDampening ?? 0);
  const rh = parseFloat(data.rh ?? data.rearHeight ?? 0);
  const rs = parseFloat(data.rs ?? data.rearStiffness ?? 0);
  const rd = parseFloat(data.rd ?? data.rearDampening ?? 0);

  document.getElementById('fh').innerText = fh.toFixed(4);
  document.getElementById('fs').innerText = fs.toFixed(4);
  document.getElementById('fd').innerText = fd.toFixed(4);
  document.getElementById('rh').innerText = rh.toFixed(4);
  document.getElementById('rs').innerText = rs.toFixed(4);
  document.getElementById('rd').innerText = rd.toFixed(4);

  __tuneCode = data.tuneCode || `fh;${fh.toFixed(4)};rh;${rh.toFixed(4)};fs;${fs.toFixed(4)};rs;${rs.toFixed(4)};fd;${fd.toFixed(4)};rd;${rd.toFixed(4)}`;
  document.getElementById('codePreview').innerText = __tuneCode;
}
function copyTuneCode(){
  navigator.clipboard.writeText(__tuneCode);
  const btn = document.querySelector('button[onclick="copyTuneCode()"]');
  const orig = btn.innerHTML;
  btn.innerHTML = "✅ Copied!";
  setTimeout(()=> btn.innerHTML = orig, 1500);
}
function toggleFront(){
  document.getElementById('frontPanel').classList.remove('hidden');
  document.getElementById('rearPanel').classList.add('hidden');
}
function toggleRear(){
  document.getElementById('rearPanel').classList.remove('hidden');
  document.getElementById('frontPanel').classList.add('hidden');
}
loadTune();
</script>
</body>
</html>
