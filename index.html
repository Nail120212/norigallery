<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexxto Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root { --bg:#000; --surface:#0a0a0a; --border:#1a1a1a; --text:#eee; --dim:#666; }
*{margin:0;padding:0;box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:'Fredoka One',cursive;min-height:100vh}
header{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:0 24px;height:60px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.89);backdrop-filter:blur(12px)}
.logo{font-size:20px;letter-spacing:0.05em}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:1px;background:var(--border);border:1px solid var(--border)}
.card{background:var(--bg)} .card-img{aspect-ratio:1;display:flex;align-items:center;justify-content:center;overflow:hidden} .card-img img{width:100%;height:100%;object-fit:contain}
.card-foot{padding:10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px} .copy-btn{width:100%;padding:6px;background:#111;border:1px solid var(--border);color:#666;font-family:'Fredoka One';cursor:pointer}
main{padding:30px;max-width:1100px;margin:0 auto}
</style>
</head>
<body>
<header><div class="logo">Nexxto</div><div id="count" style="color:#666;font-size:12px"></div></header>
<main>
<div id="loading" style="text-align:center;margin-top:100px;color:#666">Fetching stickers...</div>
<div id="content" style="display:none"><div id="grid"></div></div>
</main>
<script>
const id=new URLSearchParams(location.search).get('id');
async function init(){
 if(!id){document.getElementById('loading').innerText='Nexxto Gallery - No ID';return}
 const raw=`https://pastefy.app/${id}/raw`;
 let text=null;
 try{let r=await fetch(raw);if(r.ok)text=await r.text()}catch{}
 if(!text){try{let r=await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(raw)}`);if(r.ok)text=await r.text()}catch{}}
 if(!text){document.getElementById('loading').innerText='Failed to load';return}
 const ids=text.match(/\d{6,}/g)||[];
 document.getElementById('count').innerText=ids.length+' Stickers';
 const grid=document.getElementById('grid');
 ids.forEach(sid=>{
  const c=document.createElement('div');c.className='card';
  c.innerHTML=`<div class="card-img"><img id="img-${sid}" src="https://placehold.co/420x420/111/444?text=..." loading="lazy"></div><div class="card-foot"><div style="font-size:10px;color:#666">${sid}</div><button class="copy-btn" onclick="navigator.clipboard.writeText('${sid}')">Copy ID</button></div>`;
  grid.appendChild(c);
 });
 document.getElementById('loading').style.display='none';
 document.getElementById('content').style.display='block';
 for(let i=0;i<ids.length;i+=100){
  const chunk=ids.slice(i,i+100);
  fetch(`https://thumbnails.roproxy.com/v1/assets?assetIds=${chunk.join(',')}&returnPolicy=PlaceHolder&size=420x420&format=Png`).then(r=>r.json()).then(d=>{
   if(d&&d.data){d.data.forEach(it=>{const el=document.getElementById(`img-${it.targetId}`);if(el)el.src=it.state==="Completed"?it.imageUrl:"https://placehold.co/420x420/111/ff3333?text=N/A"})}
  })
 }
}
init();
</script>
</body>
</html>
