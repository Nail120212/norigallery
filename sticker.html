<!DOCTYPE html>
<html lang="en">
<head><!-- PLAYABLE_TOUCH_PATCH_V1 --><script>
(function() {
  if (window.__playableTouchPatchInstalled) return;
  window.__playableTouchPatchInstalled = true;
  var origAdd = EventTarget.prototype.addEventListener;
  var blockedTypes = { touchstart: 1, touchmove: 1, wheel: 1 };
  EventTarget.prototype.addEventListener = function(type, listener, options) {
    if (blockedTypes[type]) {
      if (options === undefined || options === null) {
        options = { passive: true };
      } else if (typeof options === 'boolean') {
        options = { capture: options, passive: true };
      } else {
        options = Object.assign({}, options, { passive: true });
      }
    }
    return origAdd.call(this, type, listener, options);
  };
})();
</script><script>window.Intl=window.Intl||{};Intl.t=function(s){return(Intl._locale&&Intl._locale[s])||s;};</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexxto Stickers</title>
<link rel="icon" href="/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0d;--surface:#111113;--surface-2:#161618;--border:#1f1f22;--border-soft:#19191c;--text:#e8e8ea;--dim:#a0a0a8;--muted:#2e2e34;--accent:#888;--mono:'Fredoka One',cursive;--display:'Fredoka One',cursive;--fredoka:'Fredoka One',cursive}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Fredoka One',cursive;min-height:100vh;-webkit-font-smoothing:antialiased;letter-spacing:0.02em}
header{position:sticky;top:0;z-index:100;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 32px;height:60px;border-bottom:1px solid var(--border);background:rgba(12,12,13,0.88);backdrop-filter:blur(16px)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
.logo-names{display:flex;flex-direction:column;gap:1px}
.logo-title{font-family:'Fredoka One',cursive;font-size:20px;font-weight:400;letter-spacing:0.03em;text-transform:uppercase}
.logo-sub{font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:0.18em;text-transform:uppercase}
.header-center{display:flex;flex-direction:column;align-items:center}
.header-username{font-family:var(--display);font-size:13px;font-weight:600;letter-spacing:0.04em;display:none}
.header-date{font-size:9px;color:var(--dim);text-transform:uppercase}
.header-right{display:flex;justify-content:flex-end;align-items:center}
.header-count{font-size:11px;color:var(--dim);letter-spacing:0.08em;display:none;align-items:center;gap:7px}
.header-count-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}
main{padding:40px 32px 80px;max-width:1080px;margin:0 auto}
#loading,#empty,#error{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:16px;text-align:center}
.spinner{width:32px;height:32px;border:1.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
#content{display:none}
.bar{margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--border);color:var(--dim);padding:10px 20px;font-size:12px;font-family:'Fredoka One',cursive;cursor:pointer;text-decoration:none;letter-spacing:0.02em;transition:all 0.15s;white-space:nowrap;border-radius:999px}
.btn:hover{border-color:#3a3a3e;color:var(--text);background:var(--surface)}
.btn-primary{background:var(--text);border-color:var(--text);color:var(--bg);font-weight:600}
.btn-primary:hover{background:#fff;border-color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(130px,18vw,180px),1fr));gap:1px;background:var(--border-soft);border:1px solid var(--border-soft)}
.card{background:var(--bg);display:flex;flex-direction:column;transition:background 0.15s;border-radius:18px;overflow:hidden;border:1px solid var(--border-soft)}
.card:hover{background:var(--surface)}
.card-img{width:100%;aspect-ratio:1;background:var(--surface);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:contain;transition:transform 0.2s ease}
.card:hover .card-img img{transform:scale(1.04)}
.card-foot{padding:10px 11px 11px;border-top:1px solid var(--border-soft);display:flex;flex-direction:column;gap:8px}
.card-id{font-size:10px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;padding:8px;background:none;border:1px solid var(--border-soft);color:var(--muted);font-size:11px;font-family:'Fredoka One',cursive;cursor:pointer;letter-spacing:0.02em;text-transform:uppercase;transition:all 0.15s;border-radius:999px}
.copy-btn:hover{border-color:#333338;color:var(--dim);background:var(--surface-2)}
@media(max-width:600px){header{padding:0 20px;grid-template-columns:auto 1fr auto}main{padding:28px 20px 60px}}
</style>
</head>
<body>
<header>
<a class="logo" href="/"><div class="logo-names"><span class="logo-title">Nexxto</span><span class="logo-sub">Sticker Gallery</span></div></a>
<div class="header-center"><div class="header-username" id="header-username"></div><div class="header-date" id="header-date"></div></div>
<div class="header-right"><div class="header-count" id="hcount"><div class="header-count-dot"></div><span id="hcount-text"></span></div></div>
</header>
<main>
<div id="loading"><div class="spinner"></div><div>Fetching stickers...</div></div>
<div id="empty" style="display:none"><div>Nexxto Sticker Gallery</div></div>
<div id="error" style="display:none"><div>Could not load paste</div></div>
<div id="content">
<div class="bar">
<button class="btn btn-primary" id="copy-all">Copy All IDs</button>
<a href="#" class="btn" id="raw-link" target="_blank">Raw</a>
</div>
<div class="grid" id="grid"></div>
</div>
</main>
<script>
const pasteId=new URLSearchParams(location.search).get('id')||location.pathname.split('/').filter(Boolean).pop();
function showState(el){['loading','empty','error','content'].forEach(x=>{document.getElementById(x).style.display=(x===el)?(el==='content'?'block':'flex'):'none'});}
function copyText(t,btn){const fb=()=>{const ta=Object.assign(document.createElement('textarea'),{value:t,style:'position:fixed;opacity:0'});document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);};(navigator.clipboard?navigator.clipboard.writeText(t).catch(fb):Promise.resolve(fb())).then(()=>{if(!btn)return;const o=btn.innerHTML;btn.textContent='Copied!';setTimeout(()=>{btn.innerHTML=o;},1200);});}
function parseIds(t){return t.match(/\d{6,}/g)||[];}
async function tryFetch(url){const proxies=[url,`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`];for(const u of proxies){try{const r=await fetch(u);if(r.ok){const t=await r.text();if(t)return t;}}catch(_){}}return null;}
async function init(){
if(!pasteId||['sticker','sticker.html'].includes(pasteId)){showState('empty');return;}
const rawUrl=`https://pastefy.app/${pasteId}/raw`;
document.getElementById('raw-link').href=rawUrl;
const text=await tryFetch(rawUrl);
if(!text){showState('error');return;}
const ids=parseIds(text);
if(!ids.length){showState('error');return;}
const usernameEl=document.getElementById('header-username');
usernameEl.textContent=(text.match(/^Stickers from:\s*(.+)$/m)||[])[1]?.trim()||'Sticker Pack';
usernameEl.style.display='block';
document.getElementById('hcount-text').textContent=`${ids.length} Stickers`;
document.getElementById('hcount').style.display='flex';
document.getElementById('copy-all').onclick=function(){copyText(ids.join('\n'),this);};
const grid=document.getElementById('grid');
ids.forEach(id=>{
const card=document.createElement('div');
card.className='card';
card.innerHTML=`<div class="card-img"><img id="img-${id}" src="https://placehold.co/420x420/111/444?text=..." loading="lazy"></div><div class="card-foot"><div class="card-id">${id}</div><button class="copy-btn">Copy ID</button></div>`;
card.querySelector('.copy-btn').onclick=()=>copyText(id,card.querySelector('.copy-btn'));
grid.appendChild(card);
});
showState('content');
for(let i=0;i<ids.length;i+=100){
const chunk=ids.slice(i,i+100);
fetch(`https://thumbnails.roproxy.com/v1/assets?assetIds=${chunk.join(',')}&returnPolicy=PlaceHolder&size=420x420&format=Png`).then(r=>r.json()).then(data=>{if(data&&data.data){data.data.forEach(item=>{const imgElement=document.getElementById(`img-${item.targetId}`);if(imgElement){imgElement.src=item.state==="Completed"?item.imageUrl:"https://placehold.co/420x420/111/ff3333?text=N/A";}});}}).catch(()=>{});
}
}
init();
</script>
</body>
</html>
