<!DOCTYPE html>
<html lang="en">
<head><!-- PLAYABLE_TOUCH_PATCH_V1 --><script>
(function() {
  if (window.__playableTouchPatchInstalled) return;
  window.__playableTouchPatchInstalled = true;
  var origAdd = EventTarget.prototype.addEventListener;
  var blockedTypes = { touchstart: 1, touchmove: 1, wheel: 1 };
  EventTarget.prototype.addEventListener = function(type, listener, options) {
    if (blockedTypes[type]) {
      if (options === undefined || options === null) {
        options = { passive: true };
      } else if (typeof options === 'boolean') {
        options = { capture: options, passive: true };
      } else {
        options = Object.assign({}, options, { passive: true });
      }
    }
    return origAdd.call(this, type, listener, options);
  };
})();
</script><script>window.Intl=window.Intl||{};Intl.t=function(s){return(Intl._locale&&Intl._locale[s])||s;};</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexxtohub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#07070b;color:#e8e8f0;min-height:100vh;overflow-x:hidden;}
.bg{position:fixed;inset:0;z-index:-1;background:radial-gradient(600px at 20% 10%,#1a1a3a 0%,transparent 60%),radial-gradient(800px at 80% 90%,#1e1e4a 0%,transparent 60%),#07070b;}
.top{padding:20px 24px;display:flex;justify-content:space-between;align-items:center;max-width:1100px;margin:0 auto;width:100%;}
.top a{color:#666;text-decoration:none;font-size:0.85rem;}
.hero{max-width:1100px;margin:0 auto;padding:40px 24px 20px;display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center;}
.hero h1{font-size:clamp(2rem,6vw,3.2rem);font-weight:900;letter-spacing:-0.04em;line-height:0.9;}
.hero p{color:#666;font-size:0.95rem;max-width:400px;}
.search{max-width:560px;width:100%;margin:12px auto 0;background:rgba(19,19,26,0.8);border:1px solid #22223a;border-radius:16px;padding:6px;display:flex;gap:6px;backdrop-filter:blur(12px);transition:border-color 0.2s;}
.search:focus-within{border-color:#5b6ef5;}
.search input{flex:1;background:transparent;border:none;outline:none;color:#fff;padding:14px 16px;font-family:inherit;font-size:0.95rem;}
.search button{background:#5b6ef5;color:#fff;border:none;border-radius:12px;padding:12px 20px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform 0.1s;}
.search button:active{transform:scale(0.97);}
.cards{max-width:900px;width:100%;margin:32px auto;padding:0 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;}
.card{background:rgba(19,19,26,0.7);border:1px solid #22223a;border-radius:20px;padding:28px;text-decoration:none;color:#fff;transition:all 0.2s;backdrop-filter:blur(8px);}
.card:hover{border-color:#5b6ef5;transform:translateY(-2px);background:rgba(24,24,36,0.9);}
.card .label{font-weight:700;font-size:1.1rem;}
.card .desc{font-size:0.8rem;color:#666;margin-top:6px;line-height:1.4;}
.status{margin-top:10px;font-size:0.8rem;color:#555;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="top"><a href="/">Nexxtohub</a></div>
<div class="hero">
<h1>Nexxtohub</h1>
<p>Paste your Pastefy ID and it will auto detect if its tune or sticker gallery</p>
<div class="search"><input id="paste" placeholder="Pastefy ID or https://pastefy.app/..."><button onclick="loadId()">Open</button></div>
<div id="hint" class="status">Try /tune/ID or /sticker/ID</div>
</div>
<div class="cards">
<a class="card" href="/tune"><div class="label">Tune Viewer</div><div class="desc">View jeep tune with avatar, username, jeep and front rear toggle</div></a>
<a class="card" href="/sticker"><div class="label">Sticker Gallery</div><div class="desc">View sticker boxes with image, copy button and rounded corners</div></a>
</div>
<script>
function extractId(v){
  if(!v) return null;
  let id=v.trim();
  const m=id.match(/pastefy\.app\/([^\/\?\s]+)/);
  if(m) id=m[1];
  id=id.replace(/[^a-zA-Z0-9]/g,'');
  return id||null;
}
async function tryFetchRaw(id){
  const urls=[`https://pastefy.app/${id}/raw`,`https://api.allorigins.win/raw?url=${encodeURIComponent(`https://pastefy.app/${id}/raw`)}`];
  for(const u of urls){
    try{const r=await fetch(u);if(r.ok){const t=await r.text();if(t)return t;}}catch(_){}
  }
  return null;
}
async function loadId(){
  const raw=document.getElementById('paste').value;
  const id=extractId(raw);
  if(!id){document.getElementById('hint').textContent='Invalid ID';return;}
  document.getElementById('hint').textContent='Detecting...';
  const text=await tryFetchRaw(id);
  if(!text){location.href=`/sticker/${id}`;return;}
  let isTune=false;
  try{const j=JSON.parse(text);if(j.fh!=null||j.frontHeight!=null||j.tuneCode) isTune=true;}catch{ if(text.includes('fh;')||text.includes('tuneCode')) isTune=true; }
  if(isTune) location.href=`/tune/${id}`;
  else location.href=`/sticker/${id}`;
}
document.getElementById('paste').addEventListener('keydown',e=>{if(e.key==='Enter')loadId();});
// auto load if ?id= present
(function(){
  const p=new URLSearchParams(location.search).get('id');
  if(p){document.getElementById('paste').value=p;loadId();}
})();
</script>
</body>
</html>
